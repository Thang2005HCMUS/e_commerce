version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: dev-posgres-db
    restart: always
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: